# ============================================================
# 择时因子评价框架 - 配置文件
# ============================================================

# ── 资产配置 ────────────────────────────────────────────────────
asset:
  name: "沪深300"            # 资产显示名称（用于报告标题）
  code: "000300.SH"          # 资产代码（用于匹配 price_df.csv 中的列）
  price_field: "CLOSE"       # 价格字段名称

# ── 数据文件配置 ────────────────────────────────────────────────
data:
  price_file: "price_df.csv"   # data_ini/ 中的价格文件名
  signal_file: "signal.csv"    # data_ini/ 中的信号文件名
  start_date: "2015-03-01"               # 信号测试起始日期，格式 YYYY-MM-DD，空字符串=不限制
  end_date: ""                 # 信号测试结束日期，格式 YYYY-MM-DD，空字符串=不限制

# ── 信号配置 ────────────────────────────────────────────────────
signals:
  use_all: true           # true=使用信号文件所有列，false=使用 selected 列表
  selected:                  # use_all=false 时生效，填写需分析的信号列名
    - "signal_1"
    - "signal_2"

# ── 因子评估参数 ─────────────────────────────────────────────────
evaluation:
  forward_period: 1          # 预测周期（天）
  ic_method: "pearson"       # IC计算方法：pearson / spearman
  rolling_window: 252        # 预处理滚动窗口（天，约1年）
  ic_periods:                # 多周期IC分析的预测天数
    - 1
    - 5
    - 10
    - 20
  run_robustness: true       # 是否执行稳健性检验（样本内外 + 市场状态）
  run_rolling_regression: false  # 是否执行滚动回归（耗时较长，默认关闭）
  preprocess: true           # 是否对信号做 MAD 去极值 + 滚动 Z-score 预处理

# ── 回测参数 ─────────────────────────────────────────────────────
backtest:
  benchmark_asset_ratio: 0.5    # 基准中资产占比（其余为货币/无风险资产）
  risk_free_rate: 0.03          # 无风险利率（年化，如3%）
  transaction_cost: 0.001       # 手续费率（单边，按换仓幅度计算）
  long_threshold: 0.0           # 做多信号阈值（信号 > 此值 → 全仓做多）
  short_threshold: 0.0          # 做空阈值（信号 < 此值的负值 → 空仓）

# ── 输出配置 ──────────────────────────────────────────────────────
output:
  workspace_dir: "workspace"              # 工作目录（相对 main.py 位置）
  eval_plots_subdir: "plots/eval"         # 因子评估图保存子目录
  backtest_plots_subdir: "plots/backtest" # 回测图保存子目录
  excel_filename: "timing_report.xlsx"    # Excel 报告文件名
  dpi: 100                                # 图表分辨率（DPI）
